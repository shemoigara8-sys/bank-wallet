{% extends "base.html" %}

{% block title %}
Admin Login
{% endblock %}

{% block content %}

<style>
.admin-login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.login-card {
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 400px;
}

.login-card h2 {
    text-align: center;
    color: #333;
    margin-bottom: 30px;
    font-size: 28px;
}

.login-card input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 16px;
    box-sizing: border-box;
}

.login-card input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
}

.login-card button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
}

.login-card button:hover {
    transform: translateY(-2px);
}

.notification {
    margin-top: 15px;
    padding: 10px;
    border-radius: 5px;
    text-align: center;
    display: none;
}

.notification.error {
    background: #f8d7da;
    color: #721c24;
    display: block;
}

.notification.success {
    background: #d4edda;
    color: #155724;
    display: block;
}
</style>

<div class="admin-login-container">
    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        
        <input
            type="text"
            id="adminUsername"
            placeholder="Username"
            autocomplete="off">
        
        <input
            type="password"
            id="adminPassword"
            placeholder="Password"
            autocomplete="off">
        
        <button onclick="adminLogin()">Login</button>
        
        <div id="notification" class="notification"></div>
        
        <p style="text-align: center; margin-top: 20px; color: #666; font-size: 12px;">
            Default credentials: admin / admin123
        </p>
    </div>
</div>

<script>
function adminLogin() {
    const username = document.getElementById('adminUsername').value;
    const password = document.getElementById('adminPassword').value;
    const notification = document.getElementById('notification');
    
    if (!username || !password) {
        notification.textContent = 'Please enter username and password';
        notification.className = 'notification error';
        return;
    }
    
    fetch('/admin-login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, password})
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) {
            notification.textContent = data.error;
            notification.className = 'notification error';
        } else {
            notification.textContent = data.message || 'Login successful!';
            notification.className = 'notification success';
            setTimeout(() => {
                window.location.href = '/admin';
            }, 1000);
        }
    })
    .catch(err => {
        console.error('Login error:', err);
        notification.textContent = 'Login failed. Please try again.';
        notification.className = 'notification error';
    });
}

// Allow Enter key to login
document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        adminLogin();
    }
});
</script>

{% endblock %}
